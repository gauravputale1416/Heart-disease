<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Heart Disease Prediction</h2>

        <form method="POST" action="/predict">

            <input type="number" name="age" placeholder="Age" required>

            <select name="sex" required>
                <option value="">Sex</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>

            <input type="number" name="cp" placeholder="Chest Pain Type (0–3)" required>

            <input type="number" name="bp" placeholder="Resting Blood Pressure" required>

            <input type="number" name="chol" placeholder="Cholesterol" required>

            <select name="fbs" required>
                <option value="">FBS > 120 mg/dl</option>
                <option value="1">True</option>
                <option value="0">False</option>
            </select>

            <input type="number" name="restecg" placeholder="EKG Result (0–2)" required>

            <input type="number" name="thalach" placeholder="Max Heart Rate" required>

            <select name="exang" required>
                <option value="">Exercise Induced Angina</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <input type="number" step="0.1" name="oldpeak" placeholder="ST Depression" required>

            <input type="number" name="slope" placeholder="Slope of ST (0–2)" required>

            <input type="number" name="ca" placeholder="Number of Vessels (0–3)" required>

            <input type="number" name="thal" placeholder="Thallium (0–3)" required>

            <button type="submit">Predict</button>

        </form>

        {% if prediction %}
        <h3>Result: {{ prediction }}</h3>
        {% endif %}

    </div>

</body>

</html>
