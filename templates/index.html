<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 400;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .result.disease {
            background: #ffe6e6;
            color: #d63031;
            border: 1px solid #fab1a0;
        }

        .result.no-disease {
            background: #e6f7ff;
            color: #0984e3;
            border: 1px solid #74b9ff;
        }

        .heart-icon {
            font-size: 50px;
            color: #e17055;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="heart-icon">❤️</div>
        <h2>Heart Disease Prediction</h2>
        <a href="/" style="color: white; text-decoration: none; font-size: 1.2em; margin-bottom: 20px; display: inline-block;">← Back to Home</a>

        <form method="POST" action="/predict">

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" required>
            </div>

            <div class="form-group">
                <label for="sex">Sex</label>
                <select id="sex" name="sex" required>
                    <option value="">Select Sex</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cp">Chest Pain Type (0–3)</label>
                <input type="number" id="cp" name="cp" min="0" max="3" required>
            </div>

            <div class="form-group">
                <label for="bp">Resting Blood Pressure</label>
                <input type="number" id="bp" name="bp" required>
            </div>

            <div class="form-group">
                <label for="chol">Cholesterol</label>
                <input type="number" id="chol" name="chol" required>
            </div>

            <div class="form-group">
                <label for="fbs">FBS > 120 mg/dl</label>
                <select id="fbs" name="fbs" required>
                    <option value="">Select</option>
                    <option value="1">True</option>
                    <option value="0">False</option>
                </select>
            </div>

            <div class="form-group">
                <label for="restecg">EKG Result (0–2)</label>
                <input type="number" id="restecg" name="restecg" min="0" max="2" required>
            </div>

            <div class="form-group">
                <label for="thalach">Max Heart Rate</label>
                <input type="number" id="thalach" name="thalach" required>
            </div>

            <div class="form-group">
                <label for="exang">Exercise Induced Angina</label>
                <select id="exang" name="exang" required>
                    <option value="">Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="form-group">
                <label for="oldpeak">ST Depression</label>
                <input type="number" id="oldpeak" step="0.1" name="oldpeak" required>
            </div>

            <div class="form-group">
                <label for="slope">Slope of ST (0–2)</label>
                <input type="number" id="slope" name="slope" min="0" max="2" required>
            </div>

            <div class="form-group">
                <label for="ca">Number of Vessels (0–3)</label>
                <input type="number" id="ca" name="ca" min="0" max="3" required>
            </div>

            <div class="form-group">
                <label for="thal">Thallium (0–3)</label>
                <input type="number" id="thal" name="thal" min="0" max="3" required>
            </div>

            <button type="submit">Predict Heart Disease</button>

        </form>

        {% if prediction %}
        <div class="result {% if 'Disease Detected' in prediction %}disease{% else %}no-disease{% endif %}">
            <h3>{{ prediction }}</h3>
        </div>
        {% endif %}

    </div>

</body>

</html>
